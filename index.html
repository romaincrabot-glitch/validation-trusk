<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Trusk Hub Pro - Iloé</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* --- DESIGN TRUSK PRO PINK --- */
        :root { 
            --trusk-pink: #ff0088; /* Fuchsia du Logo */
            --bg-body: #111; /* Fond très sombre */
            --bg-card: #222; /* Cartes gris foncé */
            --text-main: #fff; /* Texte blanc */
            --text-sub: #aaa; /* Texte gris clair */
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: var(--bg-body); color: var(--text-main); overflow-x: hidden; padding-bottom: 30px; display: flex; flex-direction: column; align-items: center; }
        
        /* Layout & Animations */
        .page { display: none; padding: 25px; min-height: 100vh; width: 100%; box-sizing: border-box; flex-direction: column; align-items: center; }
        .page.active { display: flex; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* Logos */
        .logo-big { width: 180px; height: auto; margin-bottom: 40px; margin-top: 50px; }
        .logo-small { width: 80px; height: auto; margin-bottom: 25px; margin-top: 10px; align-self: center; }

        /* Form Elements & Fix Dépassement */
        .card { background: var(--bg-card); padding: 30px; border-radius: 20px; box-shadow: var(--shadow); width: 100%; max-width: 400px; box-sizing: border-box; margin-bottom: 20px; }
        h2 { font-size: 1.4rem; margin-top: 0; text-align: center; }
        p.subtitle { color: var(--text-sub); text-align: center; margin-top: -10px; margin-bottom: 25px; }
        
        /* LE FIX : box-sizing sur les inputs */
        input, select { width: 100%; padding: 18px; margin: 12px 0; border: 2px solid #333; border-radius: 12px; font-size: 16px; outline: none; transition: 0.2s; -webkit-appearance: none; background: #2a2a2a; color: white; box-sizing: border-box; /* Force l'input à rester DANS la carte */ }
        
        input:focus, select:focus { border-color: var(--trusk-pink); }
        label { font-weight: 600; font-size: 14px; margin-left: 5px; color: var(--text-sub); display: block; margin-top: 10px; }

        /* Buttons (Couleur Pink) */
        .btn { width: 100%; max-width: 400px; padding: 20px; border: none; border-radius: 15px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase; letter-spacing: 1px; box-sizing: border-box; }
        .btn:active { transform: scale(0.97); }
        .btn-blue { background: var(--trusk-pink); color: white; box-shadow: 0 5px 15px rgba(255,0,136,0.3); }
        .btn-outline { background: none; border: 2px solid #333; color: white; }
        .btn-back { margin-top: auto; padding: 15px; font-size: 14px; color: var(--text-sub); text-decoration: underline; background: none; border: none; align-self: center; }

        /* Menu Grid */
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 10px; width: 100%; max-width: 400px; box-sizing: border-box; }
        .menu-item { background: var(--bg-card); padding: 35px 25px; border-radius: 20px; text-align: center; border: 2px solid #333; transition: 0.2s; box-shadow: var(--shadow); display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box; }
        .menu-item:active { border-color: var(--trusk-pink); background: #2a2a2a; }
        .menu-item .icon { font-size: 36px; display: block; margin-bottom: 12px; }

        /* Specifics */
        #reader { width: 100%; border-radius: 15px; overflow: hidden; background: #000; border: 2px solid #333; max-width: 400px; box-sizing: border-box; }
        .scanned-list { margin-top: 15px; padding: 0; width: 100%; max-width: 400px; box-sizing: border-box; }
        .scanned-item { background: #2a2a2a; padding: 15px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .preview-img { width: 100%; border-radius: 12px; margin-top: 15px; display: none; border: 3px solid var(--trusk-pink); max-width: 400px; box-sizing: border-box; }
        
        /* Flash Animation (Pink) */
        .flash-success { animation: flash 0.4s; }
        @keyframes flash { 0% { background-color: rgba(255, 0, 136, 0.5); } 100% { background-color: transparent; } }
    </style>
</head>
<body>

    <div id="page-login" class="page active">
        <img src="https://i.postimg.cc/mD8XfS7z/logo-trusk.png" class="logo-big" alt="Trusk Hub">
        <div class="card">
            <h2 style="margin-bottom: 30px;">Bonjour 👋</h2>
            <label>NOM DU CHAUFFEUR</label>
            <input type="text" id="driverName" placeholder="Ex: Jean Martin">
            
            <label>TOURNEE DU JOUR</label>
            <select id="tourneeSelect">
                <option value="">Sélectionner...</option>
                <option value="Tournée 1">Tournée 1</option>
                <option value="Tournée 2">Tournée 2</option>
                <option value="Tournée 3">Tournée 3</option>
            </select>
            <button class="btn btn-blue" style="margin-top: 15px;" onclick="goMenu()">Continuer</button>
        </div>
    </div>

    <div id="page-menu" class="page">
        <img src="https://i.postimg.cc/mD8XfS7z/logo-trusk.png" class="logo-small" alt="Trusk">
        <h2>Menu du Jour</h2>
        <p class="subtitle" id="menuWelcomeText"></p>
        <div class="menu-grid">
            <div class="menu-item" onclick="goDepart()">
                <div class="icon">🚚</div>
                <strong>Valider le départ</strong>
                <p style="font-size: 12px; color: var(--text-sub); margin-top:8px;">Photos documents & étiquettes</p>
            </div>
            <div class="menu-item" onclick="goRetour()">
                <div class="icon">📦</div>
                <strong>Retour appareils</strong>
                <p style="font-size: 12px; color: var(--text-sub); margin-top:8px;">Scan Ecosystem (Déchargement)</p>
            </div>
        </div>
        <button class="btn-back" onclick="goPage('page-login')">Changer de nom ou de tournée</button>
    </div>

    <div id="page-action-depart" class="page">
        <img src="https://i.postimg.cc/mD8XfS7z/logo-trusk.png" class="logo-small" alt="Trusk">
        <h2>Preuve de départ 📸</h2>
        <p class="subtitle">Prenez en photo vos étiquettes et feuilles de route.</p>
        <div class="card">
            <input type="file" id="photoInput" accept="image/*" capture="camera" style="display: none;" onchange="previewPhoto(this)">
            <button class="btn btn-outline" onclick="document.getElementById('photoInput').click()">📷 Prendre la photo</button>
            <img id="imgPreview" class="preview-img">
        </div>
        <button class="btn btn-blue" id="btnValidDepart" style="margin-top: 10px;" onclick="sendDepart()">Valider mon départ</button>
        <button class="btn-back" onclick="goMenu()">Retour au menu</button>
    </div>

    <div id="page-action-retour" class="page">
        <img src="https://i.postimg.cc/mD8XfS7z/logo-trusk.png" class="logo-small" alt="Trusk">
        <h2>Scan Retour 📦</h2>
        <p class="subtitle">Scannez chaque appareil pour valider le déchargement.</p>
        <div id="reader"></div>
        <button class="btn btn-blue" style="margin-top: 20px;" onclick="startScanner()">📷 Activer la caméra</button>
        <ul id="scannedList" class="scanned-list"></ul>
        <button class="btn btn-blue" id="btnSendRetour" style="display: none; margin-top: 15px;" onclick="sendRetour()">Terminer le déchargement</button>
        <button class="btn-back" onclick="stopScanner(); goMenu()">Retour au menu</button>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx9eHiFeRMZ9Zh0fO63Kb3LmgQoDEpkw12kZGdxdIPRI6ozg4y12eKqs0TEJb13Bdl-/exec";
        let scannedData = [];
        let html5QrCode = null;

        // --- NAVIGATION ---
        function goPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function goMenu() {
            const name = document.getElementById("driverName").value;
            const tournee = document.getElementById("tourneeSelect").value;
            if(!name || !tournee) return alert("Veuillez remplir votre identité et votre tournée.");
            localStorage.setItem('trusk_driver_ident', name);
            document.getElementById('menuWelcomeText').innerText = name + " - " + tournee;
            goPage('page-menu');
        }

        function goDepart() { goPage('page-action-depart'); }
        function goRetour() { goPage('page-action-retour'); }

        // --- GESTION PHOTO (DEPART) ---
        let photoBase64 = "";
        function previewPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('imgPreview');
                    img.src = e.target.result;
                    img.style.display = "block";
                    photoBase64 = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // --- GESTION SCANNER (RETOUR) ---
        function startScanner() {
            if(!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 280 }, (text) => {
                document.body.classList.add('flash-success');
                setTimeout(() => document.body.classList.remove('flash-success'), 400);
                if (navigator.vibrate) navigator.vibrate(100);

                let code = text;
                try {
                    const url = new URL(text);
                    code = url.searchParams.get('codeEquipement') || text;
                } catch(e) {}

                if(!scannedData.includes(code)) {
                    scannedData.push(code);
                    renderList();
                }
            });
        }

        function stopScanner() {
            if(html5QrCode) html5QrCode.stop().catch(() => {});
        }

        function renderList() {
            const list = document.getElementById("scannedList");
            list.innerHTML = scannedData.map((c, i) => `
                <li class="scanned-item">
                    <strong>${c}</strong>
                    <span style="color:#ff3333; font-weight:bold" onclick="removeScan(${i})">Suppr.</span>
                </li>
            `).join('');
            document.getElementById("btnSendRetour").style.display = scannedData.length > 0 ? "block" : "none";
        }

        function removeScan(i) {
            scannedData.splice(i, 1);
            renderList();
        }

        // --- ENVOIS ---
        function sendDepart() {
            if(!photoBase64) return alert("Prenez une photo d'abord.");
            document.getElementById("btnValidDepart").innerText = "Envoi en cours...";
            document.getElementById("btnValidDepart").disabled = true;

            const payload = {
                type: "DEPART",
                driver: document.getElementById("driverName").value + " (" + document.getElementById("tourneeSelect").value + ")",
                scans: "Photo documents transmise",
                signature: photoBase64
            };
            postData(payload, true);
        }

        function sendRetour() {
            document.getElementById("btnSendRetour").innerText = "Envoi en cours...";
            document.getElementById("btnSendRetour").disabled = true;

            const payload = {
                type: "RETOUR",
                driver: document.getElementById("driverName").value + " (" + document.getElementById("tourneeSelect").value + ")",
                scans: scannedData,
                signature: ""
            };
            postData(payload, true);
        }

        function postData(payload, reset) {
            fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) })
            .then(() => {
                alert("Validé avec succès !");
                if (reset) {
                    resetActionData();
                    goMenu(); 
                }
            }).catch(() => {
                alert("Erreur de connexion. Veuillez réessayer.");
                resetButtons();
            });
        }

        function resetActionData() {
            photoBase64 = "";
            document.getElementById('imgPreview').style.display = "none";
            document.getElementById('imgPreview').src = "";
            document.getElementById('photoInput').value = "";
            stopScanner();
            scannedData = [];
            renderList();
            resetButtons();
        }

        function resetButtons() {
            document.getElementById("btnValidDepart").innerText = "Valider mon départ";
            document.getElementById("btnValidDepart").disabled = false;
            document.getElementById("btnSendRetour").innerText = "Terminer le déchargement";
            document.getElementById("btnSendRetour").disabled = false;
        }

        // INITIALISATION
        window.onload = () => {
            const saved = localStorage.getItem('trusk_driver_ident');
            if(saved) document.getElementById("driverName").value = saved;
        };
    </script>
</body>
</html>
