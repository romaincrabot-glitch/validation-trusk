<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Trusk Hub Pro - Iloé</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { 
            --trusk-blue: #0088ff; 
            --bg-body: #000000; 
            --bg-card: #1c1c1e; 
            --text-main: #ffffff; 
            --text-sub: #8e8e93; 
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; 
            background: var(--bg-body); 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        .page { display: none; padding: 20px; width: 100%; box-sizing: border-box; flex-direction: column; align-items: center; }
        .page.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* LOGO GITHUB */
        .logo-container { width: 100%; text-align: center; margin: 40px 0; }
        .logo-img { width: 220px; height: auto; }
        .logo-small { width: 100px; margin: 10px 0 20px 0; }

        /* FIX ENCART : box-sizing indispensable */
        .card { 
            background: var(--bg-card); 
            padding: 25px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 380px; 
            box-sizing: border-box; /* Empêche le contenu de dépasser */
            margin-bottom: 20px; 
        }
        
        h2 { text-align: center; margin-top: 0; }
        
        label { 
            font-weight: 600; font-size: 12px; color: var(--text-sub); 
            display: block; margin-bottom: 5px; text-transform: uppercase; 
        }

        /* FIX INPUTS : width 100% + border-box */
        input, select { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 20px; 
            border: 1px solid #333; 
            border-radius: 12px; 
            font-size: 16px; 
            background: #2c2c2e; 
            color: white; 
            box-sizing: border-box; /* Reste à l'intérieur de la carte */
            -webkit-appearance: none;
        }

        .btn { 
            width: 100%; padding: 18px; border: none; border-radius: 15px; 
            font-weight: 700; font-size: 16px; cursor: pointer; 
            text-transform: uppercase; box-sizing: border-box;
        }
        .btn-blue { background: var(--trusk-blue); color: white; }
        .btn-outline { background: none; border: 2px solid #333; color: white; margin-top: 10px; }
        .btn-back { background: none; color: var(--text-sub); text-decoration: underline; margin-top: 20px; border: none; }

        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; max-width: 380px; }
        .menu-item { 
            background: var(--bg-card); padding: 30px; border-radius: 20px; 
            text-align: center; border: 1px solid #333; 
        }

        #reader { width: 100%; border-radius: 15px; overflow: hidden; background: #000; }
        .preview-img { width: 100%; border-radius: 12px; margin-top: 15px; display: none; border: 2px solid var(--trusk-blue); }
    </style>
</head>
<body>

    <div id="page-login" class="page active">
        <div class="logo-container">
            <img src="https://github.com/romaincrabot-glitch/validation-trusk/blob/main/TRUSK_BLUE%20(1).png?raw=true" class="logo-img" alt="Trusk Logo">
        </div>
        <div class="card">
            <h2>Bonjour 👋</h2>
            <label>Nom du chauffeur</label>
            <input type="text" id="driverName" placeholder="Ton nom">
            <label>Tournée</label>
            <select id="tourneeSelect">
                <option value="">Choisir...</option>
                <option value="T1">Tournée 1</option>
                <option value="T2">Tournée 2</option>
            </select>
            <button class="btn btn-blue" onclick="goMenu()">Continuer</button>
        </div>
    </div>

    <div id="page-menu" class="page">
        <img src="https://github.com/romaincrabot-glitch/validation-trusk/blob/main/TRUSK_BLUE%20(1).png?raw=true" class="logo-small">
        <h2 id="menuWelcomeText">Menu</h2>
        <div class="menu-grid">
            <div class="menu-item" onclick="goPage('page-action-depart')">
                <strong>🚚 DÉPART</strong>
            </div>
            <div class="menu-item" onclick="goPage('page-action-retour')">
                <strong>📦 RETOUR</strong>
            </div>
        </div>
        <button class="btn-back" onclick="goPage('page-login')">Déconnexion</button>
    </div>

    <div id="page-action-depart" class="page">
        <h2>Photo Départ 📸</h2>
        <div class="card">
            <input type="file" id="photoInput" accept="image/*" capture="camera" style="display: none;" onchange="previewPhoto(this)">
            <button class="btn btn-outline" onclick="document.getElementById('photoInput').click()">Prendre Photo</button>
            <img id="imgPreview" class="preview-img">
        </div>
        <button class="btn btn-blue" id="btnValidDepart" onclick="sendDepart()">Valider</button>
        <button class="btn-back" onclick="goPage('page-menu')">Retour</button>
    </div>

    <div id="page-action-retour" class="page">
        <h2>Scan Retour 📦</h2>
        <div id="reader"></div>
        <button class="btn btn-blue" style="margin-top:15px;" onclick="startScanner()">Lancer Scanner</button>
        <button class="btn-back" onclick="stopScanner(); goPage('page-menu')">Retour</button>
    </div>

    <script>
        const SCRIPT_URL = "TON_URL_GOOGLE_APPS_SCRIPT";
        let photoBase64 = "";

        function goPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function goMenu() {
            const name = document.getElementById("driverName").value;
            if(!name) return alert("Nom requis");
            document.getElementById('menuWelcomeText').innerText = name;
            goPage('page-menu');
        }

        function previewPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('imgPreview').src = e.target.result;
                    document.getElementById('imgPreview').style.display = "block";
                    photoBase64 = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function startScanner() {
            const html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                alert("Scanné : " + text);
            });
        }
        
        function stopScanner() { /* Logique d'arrêt */ }

        function sendDepart() {
            if(!photoBase64) return alert("Photo manquante");
            alert("Envoi en cours...");
            // Logique fetch vers ton Google Sheet ici
        }
    </script>
</body>
</html>
