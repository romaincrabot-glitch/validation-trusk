<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Validation Trusk - Iloé</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; background: #f4f7f9; color: #333; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { font-size: 1.1rem; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-black { background: black; color: white; margin-top: 10px; }
        .btn-scan { background: #00aaff; color: white; margin-top: 10px; }
        #signature-pad { border: 1px solid #eee; width: 100%; height: 180px; border-radius: 8px; background: #fafafa; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; margin-top: 10px; }
        .scanned-list { padding: 0; list-style: none; }
        .scanned-item { background: #f0f0f0; padding: 10px; border-radius: 6px; margin-top: 8px; font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center; }
        .remove-btn { color: red; font-weight: bold; padding: 5px 10px; }
        .flash-success { animation: flash 0.4s; }
        @keyframes flash { 0% { background-color: rgba(0, 255, 0, 0.5); } 100% { background-color: transparent; } }
    </style>
</head>
<body>

    <div class="card">
        <h2>🚚 1. Émargement Départ</h2>
        <input type="text" id="driverName" placeholder="Ton Prénom / Nom">
        <canvas id="signature-pad"></canvas>
        <button class="btn btn-black" onclick="sendData('DEPART')">Valider le Départ</button>
    </div>

    <div class="card">
        <h2>📦 2. Déchargement Ecosystem</h2>
        <div id="reader"></div>
        <button class="btn btn-scan" onclick="startScan()">📷 Scanner un appareil</button>
        <ul id="scannedList" class="scanned-list"></ul>
        <button class="btn btn-black" id="btn-save-unload" style="display:none;" onclick="sendData('DECHARGEMENT')">Valider le Retour</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx9eHiFeRMZ9Zh0fO63Kb3LmgQoDEpkw12kZGdxdIPRI6ozg4y12eKqs0TEJb13Bdl-/exec";
        const canvas = document.getElementById("signature-pad");
        const signaturePad = new SignaturePad(canvas);
        const html5QrCode = new Html5Qrcode("reader");
        let scannedData = [];

        function resizeCanvas() {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            signaturePad.clear();
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        function startScan() {
            html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (decodedText) => {
                document.body.classList.add('flash-success');
                setTimeout(() => document.body.classList.remove('flash-success'), 400);
                if (navigator.vibrate) navigator.vibrate(100);

                let codeToStore = decodedText;
                try {
                    const urlObj = new URL(decodedText);
                    const params = new URLSearchParams(urlObj.search);
                    const codeEquip = params.get('codeEquipement');
                    if (codeEquip) { codeToStore = codeEquip; }
                } catch (e) { }

                if (!scannedData.includes(codeToStore)) {
                    scannedData.push(codeToStore);
                    updateUI();
                }
            }).catch(err => alert("Erreur caméra : " + err));
        }

        function updateUI() {
            const list = document.getElementById("scannedList");
            list.innerHTML = "";
            scannedData.forEach((code, index) => {
                const li = document.createElement("li");
                li.className = "scanned-item";
                li.innerHTML = `<span>${code}</span><span class="remove-btn" onclick="removeItem(${index})">Suppr.</span>`;
                list.appendChild(li);
            });
            document.getElementById("btn-save-unload").style.display = scannedData.length > 0 ? "block" : "none";
        }

        function removeItem(index) {
            scannedData.splice(index, 1);
            updateUI();
        }

        function sendData(type) {
            const driver = document.getElementById("driverName").value;
            if(!driver) return alert("Indique ton nom");

            const payload = {
                type: type,
                driver: driver,
                scans: type === 'DECHARGEMENT' ? scannedData : "", // On envoie le tableau brut
                signature: type === 'DEPART' ? signaturePad.toDataURL() : ""
            };

            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(payload)
            }).then(() => {
                alert("Enregistré avec succès !");
                location.reload();
            }).catch(err => alert("Erreur d'envoi."));
        }
    </script>
</body>
</html>
